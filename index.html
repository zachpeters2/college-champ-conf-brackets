<style>
:root {
  --card-w:290px;--row-h:34px;--info-h:26px;--card-h:calc(var(--row-h)*2 + var(--info-h));
  --col-gap:44px;--pad:24px;--hdr-h:58px;
  --bg:#0d0f14;--surface:#14171f;--surface2:#0f1219;
  --border:#252931;--border-hi:#353a47;--text:#e4e7ef;
  --muted:#525a6e;--dim:#363c4a;
  --win-bg:#0f1a10;--win-brd:#1e3d20;--seg-color:#353a47;
  --accent:#c8a84b;--accent-hi:#dfc06a;--accent-dim:rgba(200,168,75,0.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;overflow:hidden}
#sidebar{width:220px;min-width:220px;height:100vh;overflow-y:auto;background:#0a0c11;border-right:1px solid #1e2129;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s,min-width .2s;position:relative;z-index:10}
#sidebar.collapsed{width:48px;min-width:48px}
.sb-header{padding:18px 14px 14px;border-bottom:1px solid #1e2129;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-title{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#525a6e;white-space:nowrap;overflow:hidden;transition:opacity .15s}
#sidebar.collapsed .sb-title{opacity:0;pointer-events:none}
.sb-toggle{background:none;border:1px solid #252931;color:#525a6e;width:24px;height:24px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:background .12s,color .12s;font-family:'Barlow Condensed',sans-serif;line-height:1}
.sb-toggle:hover{background:#14171f;color:#e4e7ef}
.conf-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border:none;background:none;cursor:pointer;width:100%;text-align:left;border-bottom:1px solid #1a1d24;position:relative;transition:background .12s;overflow:hidden}
.conf-btn:hover{background:#0f1219}
.conf-btn.active{background:#101318}
.conf-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-accent)}
.conf-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--c-accent);opacity:.6;transition:opacity .12s}
.conf-btn.active .conf-dot{opacity:1}
.conf-btn-text{min-width:0;overflow:hidden;transition:opacity .15s}
#sidebar.collapsed .conf-btn-text{opacity:0}
.conf-name{font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#b0b8cc;white-space:nowrap}
.conf-btn.active .conf-name{color:#e4e7ef}
.conf-dates{font-size:10px;color:#525a6e;margin-top:2px;white-space:nowrap;font-family:'Barlow',sans-serif}
#main{flex:1;min-width:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.site-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#0b0e17 0%,var(--bg) 60%);display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.hdr-sponsor{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent-hi)}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;line-height:1.1}
.hdr-title em{font-style:normal;color:var(--accent-hi)}
.hdr-sub{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:1px}
.hdr-meta{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent-hi);padding:3px 9px;border-radius:3px}
.last-upd{font-family:'Barlow',sans-serif;font-size:11px;color:var(--muted)}
.refresh-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:transparent;border:1px solid var(--border-hi);color:var(--text);padding:4px 13px;border-radius:3px;cursor:pointer;transition:background .12s,border-color .12s}
.refresh-btn:hover{background:var(--surface);border-color:var(--accent)}
.status-bar{padding:7px 24px;font-family:'Barlow',sans-serif;font-size:12px;display:none;gap:8px;align-items:center;border-bottom:1px solid transparent;flex-shrink:0}
.status-bar.info{display:flex;background:#12192a;border-color:var(--accent);color:var(--accent-hi)}
.status-bar.ok{display:flex;background:#0f1a10;border-color:#1e3d20;color:#7bc47b}
.status-bar.error{display:flex;background:#1c1010;border-color:#6b2020;color:#e07070}
.bracket-outer{padding:24px;overflow-x:auto;flex:1}
.bracket{position:relative;display:flex;align-items:stretch}
.round{width:var(--card-w);flex-shrink:0;display:flex;flex-direction:column}
.rnd-hdr{height:var(--hdr-h);padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;flex-direction:column;justify-content:flex-end}
.rnd-name{font-size:12px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--text)}
.rnd-date,.rnd-venue{font-size:10px;color:var(--muted);letter-spacing:0.05em;margin-top:1px}
.rnd-note{font-size:10px;color:var(--accent-hi);font-weight:600;letter-spacing:0.05em;margin-top:2px}
.cards-area{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;gap:12px;padding:10px 0}
.cards-area.split{justify-content:flex-start;gap:0;padding:0}
.cards-split-gap{display:none}

.conn-col{width:var(--col-gap);flex-shrink:0;position:relative;align-self:stretch}
.conn-col svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.card{border:1px solid var(--border);border-radius:5px;overflow:hidden;background:var(--surface);transition:border-color .15s}
.card:hover{border-color:var(--border-hi)}
.trow{display:flex;align-items:center;gap:7px;padding:0 10px;height:var(--row-h);position:relative}
.trow+.trow{border-top:1px solid var(--border)}
.seed{font-size:11px;font-weight:600;color:var(--muted);width:16px;text-align:right;flex-shrink:0;line-height:1}
.tinfo{flex:1;min-width:0}
.tname{font-size:13px;font-weight:700;letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trec{font-size:10px;color:var(--muted);letter-spacing:0.03em;margin-top:1px}
.tscore{font-size:15px;font-weight:800;min-width:28px;text-align:right;flex-shrink:0}
.trow.winner{background:var(--win-bg)}
.trow.winner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-hi)}
.trow.winner .tname,.trow.winner .tscore{color:var(--text)}
.trow.winner .trec,.trow.winner .seed{color:var(--muted)}
.trow.loser .tname,.trow.loser .tscore{color:#434a59}
.trow.loser .trec,.trow.loser .seed{color:#363c4a}
.trow.tbd .tname{color:var(--muted);font-style:italic;font-weight:400}
.trow.tbd .tscore,.trow.upcoming .tscore,.trow.tbd .seed{color:#363c4a}
.ginfo{height:var(--info-h);display:flex;align-items:center;justify-content:center;gap:7px;border-top:1px solid var(--border);background:var(--surface2);padding:0 8px}
.gtime{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted)}
.gdot{color:#363c4a;font-size:9px}
.gnet{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--accent-hi)}
.gfinal{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);opacity:.7}
.gboxscore{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent-hi);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .12s}
.gboxscore:hover{color:var(--text)}
.gboxscore svg{opacity:.7}
.site-footer{padding:12px 24px;border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.ft-disc{font-size:10px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;text-align:center}
.ft-links{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent-hi)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid #353a47;border-top-color:var(--accent-hi);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

</style>
</head>

  <header class="site-header">

    <div class="hdr-sub" id="hdrSub"></div>
    <div class="hdr-meta">
      <div id="hdrBadges" style="display:contents"></div>

<script>

// ── Engine ───────────────────────────────────────────────────
const CONFS = {};
let activeConf = null;
let DATA = null;

function registerConf(id, cfg) { CONFS[id] = cfg; }

function switchConf(id) {
  if (activeConf === id) return;
  activeConf = id;
  const cfg = CONFS[id];
  DATA = cfg.data;
  const root = document.documentElement;
  root.style.setProperty('--accent',     cfg.accent);
  root.style.setProperty('--accent-hi',  cfg.accentHi);
  root.style.setProperty('--accent-dim', cfg.accentDim);
  document.getElementById('hdrSponsor').textContent = cfg.sponsor;
  document.getElementById('hdrTitle').innerHTML    = cfg.titleHTML;
  document.getElementById('hdrSub').textContent    = cfg.sub;
  document.getElementById('hdrBadges').innerHTML   = (cfg.badges||[]).map(b => `<span class="badge">${b}</span>`).join('');
  document.getElementById('ftDisc').textContent    = cfg.footerDisc;
  document.getElementById('ftLinks').innerHTML     = cfg.footerLinks;
  document.querySelectorAll('.conf-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.conf === id);
  });
  document.getElementById('statusBar').className = 'status-bar';
  
  fetchIfNeeded();
}

function rowClass(side, g) {
  const t = side === 'top' ? g.top : g.bot;
  const isTbd = !t || !t.name || /(Winner|TBD|QF[0-9])/.test(t.name);
  if (isTbd) return 'tbd';
  if (g.status === 'final') return g.winner === side ? 'winner' : 'loser';
  if (g.status === 'live')  return 'live';
  return 'upcoming';
}
function sc(g, s) {
  const v = s === 'top' ? g.topScore : g.botScore;
  return (v !== null && v !== undefined) ? v : '—';
}
function cardHTML(g) {
  const tc = rowClass('top',g), bc = rowClass('bot',g);
  const tRec = g.top.rec ? `<div class="trec">${g.top.rec}</div>` : '';
  const bRec = g.bot.rec ? `<div class="trec">${g.bot.rec}</div>` : '';
  const tS = (g.top.seed != null) ? g.top.seed : '';
  const bS = (g.bot.seed != null) ? g.bot.seed : '';
  let ginfoHTML;
  if (g.status === 'final') {
    ginfoHTML = g.espnId
      ? `<a class="gboxscore" href="https://www.espn.com/mens-college-basketball/boxscore/_/gameId/${g.espnId}" target="_blank" rel="noopener">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="3" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M3 3V2a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="5" y1="5.5" x2="5" y2="7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Box Score
        </a>`
      : `<span class="gfinal">Final</span>`;
  } else {
    ginfoHTML = `<span class="gtime">${g.time}</span><span class="gdot">·</span><span class="gnet">${g.net}</span>`;
  }
  return `<div class="card" data-id="${g.id}">
  <div class="trow ${tc}"><span class="seed">${tS}</span><div class="tinfo"><div class="tname">${g.top.name}</div>${tRec}</div><span class="tscore">${sc(g,'top')}</span></div>
  <div class="trow ${bc}"><span class="seed">${bS}</span><div class="tinfo"><div class="tname">${g.bot.name}</div>${bRec}</div><span class="tscore">${sc(g,'bot')}</span></div>
  <div class="ginfo">${ginfoHTML}</div>
</div>`;
}

function render() {
  let html = '';
  DATA.rounds.forEach((r, i) => {
    const note = r.note ? `<div class="rnd-note">${r.note}</div>` : '';
    let cardsHTML = '';
    r.games.forEach((g, gi) => {
      cardsHTML += cardHTML(g);
      if (r.splitAfter !== undefined && gi === r.splitAfter)
        cardsHTML += `<div class="cards-split-gap" data-split="${r.id}"></div>`;
    });
    const splitClass = r.splitAfter !== undefined ? ' split' : '';
    html += `<div class="round" data-round="${r.id}">
  <div class="rnd-hdr"><div class="rnd-name">${r.label}</div><div class="rnd-date">${r.date}</div><div class="rnd-venue">${r.venue}</div>${note}</div>
  <div class="cards-area${splitClass}">${cardsHTML}</div>
</div>`;
    if (i < DATA.rounds.length - 1) {
      const next = DATA.rounds[i+1];
      if (next.connectors && next.connectors.length) {
        html += `<div class="conn-col" data-conn="${r.id}-${next.id}"><svg></svg></div>`;
      } else {
        html += `<div style="width:var(--col-gap);flex-shrink:0"></div>`;
      }
    }
  });
  document.getElementById('bracket').innerHTML = html;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    alignSplitGaps();
    requestAnimationFrame(drawConnectors);
  }));
  document.getElementById('lastUpd').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function alignSplitGaps() {
  const bEl  = document.getElementById('bracket');
  const rowH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--row-h')) || 34;
  const infoH= parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--info-h'))|| 26;
  const cardH= rowH * 2 + infoH;
  const gap  = 12;
  const hdrH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hdr-h')) || 58;

  DATA.rounds.forEach((r, ri) => {
    if (r.splitAfter === undefined) return;

    const semiR  = DATA.rounds[ri + 1]; if (!semiR) return;
    const champR = DATA.rounds[ri + 2]; if (!champR) return;

    const qfCards   = r.games.map(g => bEl.querySelector('[data-id="' + g.id + '"]')).filter(Boolean);
    const semiCards = semiR.games.map(g => bEl.querySelector('[data-id="' + g.id + '"]')).filter(Boolean);
    if (qfCards.length < 4 || semiCards.length < 2) return;

    // Step 1: reset margins, clear any forced min-height
    qfCards.forEach(c => { c.style.marginTop = ''; });
    semiCards.forEach(c => { c.style.marginTop = ''; });
    const champCardsReset = champR.games.map(g => bEl.querySelector('[data-id="' + g.id + '"]')).filter(Boolean);
    champCardsReset.forEach(c => { c.style.marginTop = ''; });
    bEl.style.minHeight = '';
    void bEl.offsetHeight;

    // Step 2: compute the minimum bracket height needed to fit 4 QF cards
    // without overlap AND produce a flat connector.
    // With 4 cards in 2 pairs, each pair spanning B vertically (the bar height),
    // and a minimum gap of (cardH + gap) between the pairs:
    //   total cards content = 4*cardH + 3*gap + inter-pair-gap
    // For the semi->champ connector to remain flat with 2 semis in space-evenly,
    // we need semi separation >= B + cardH + gap.
    // With space-evenly (2 cards, height H_content = H - hdrH):
    //   semi separation (center to center) = H_content / 3
    // So: H_content / 3 >= B_desired + cardH + gap
    // We want B_desired = current B (the perfect semi->champ bar height)
    // => H_content >= 3 * (B + cardH + gap)
    // => bracket min-height = 3*(B+cardH+gap) + hdrH + padding

    function divY(card) {
      const row = card.querySelector('.trow'); const rr = row.getBoundingClientRect(); return rr.top + rr.height;
    }
    function centerY(card) {
      const rr = card.getBoundingClientRect(); return rr.top + rr.height / 2;
    }

    const B = divY(semiCards[semiCards.length - 1]) - divY(semiCards[0]);

    // Required content height for semis to be far enough apart
    const requiredContentH = 3 * (B + cardH + gap);
    const currentH = bEl.getBoundingClientRect().height;
    const requiredH = requiredContentH + hdrH + 20; // 20px for padding
    if (currentH < requiredH) {
      bEl.style.minHeight = requiredH + 'px';
      void bEl.offsetHeight; // reflow so semi positions update
    }

    // Step 3: re-measure semi positions after potential height change
    const semi1C = centerY(semiCards[0]);
    const semi2C = centerY(semiCards[semiCards.length - 1]);

    // Step 4: compute QF card targets using B
    const targets = [semi1C - B/2 - rowH, semi1C + B/2 - rowH, semi2C - B/2 - rowH, semi2C + B/2 - rowH];
    const naturalTops = qfCards.map(c => c.getBoundingClientRect().top);

    let cumulativeShift = 0;
    qfCards.forEach((card, i) => {
      const needed = targets[i] - naturalTops[i] - cumulativeShift;
      card.style.marginTop = needed + 'px';
      cumulativeShift += needed;
    });

    // Step 5: reflow, then move each semi card so its center aligns with
    // the midpoint of its QF pair's two dividers (making QF->semi arms flat).
    void bEl.offsetHeight;
    const qfDivs = qfCards.map(c => divY(c));
    // pair 1 midpoint = avg of qf0 and qf1 dividers
    // pair 2 midpoint = avg of qf2 and qf3 dividers
    const pair1Mid = (qfDivs[0] + qfDivs[1]) / 2;
    const pair2Mid = (qfDivs[2] + qfDivs[3]) / 2;
    // semi card center should equal its pair midpoint
    // center = card.top + cardH/2  =>  card.top = pairMid - cardH/2
    semiCards.forEach((card, i) => {
      const pairMid = i === 0 ? pair1Mid : pair2Mid;
      const currentTop = card.getBoundingClientRect().top;
      const targetTop  = pairMid - cardH / 2;
      card.style.marginTop = (targetTop - currentTop) + 'px';
    });

    // Step 6: reflow, then move the champ card so its center aligns with
    // the midpoint of the two semi dividers (making semi->champ arm flat).
    void bEl.offsetHeight;
    const champCards = champR.games.map(g => bEl.querySelector('[data-id="' + g.id + '"]')).filter(Boolean);
    if (champCards.length) {
      const semi1Div   = divY(semiCards[0]);
      const semi2Div   = divY(semiCards[semiCards.length - 1]);
      const semiBarMid = (semi1Div + semi2Div) / 2;
      const champCard  = champCards[0];
      const currentTop = champCard.getBoundingClientRect().top;
      const targetTop  = semiBarMid - cardH / 2;
      champCard.style.marginTop = (targetTop - currentTop) + 'px';
    }
  });
}

function drawConnectors() {
  const bEl   = document.getElementById('bracket');
  const bRect = bEl.getBoundingClientRect();
  function absY(el) { return el.getBoundingClientRect().top - bRect.top; }
  function getY(gid, side) {
    const card = bEl.querySelector('[data-id="' + gid + '"]');
    if (!card) return null;
    const rows = card.querySelectorAll('.trow');
    if (side === 'divider') return absY(rows[0]) + rows[0].getBoundingClientRect().height;
    if (side === 'top') { const r = rows[0].getBoundingClientRect(); return absY(rows[0]) + r.height/2; }
    const r = rows[1].getBoundingClientRect(); return absY(rows[1]) + r.height/2;
  }
  function getRX(gid) { const c = bEl.querySelector('[data-id="'+gid+'"]'); return c ? c.getBoundingClientRect().right - bRect.left : null; }
  function getLX(gid) { const c = bEl.querySelector('[data-id="'+gid+'"]'); return c ? c.getBoundingClientRect().left  - bRect.left : null; }

  DATA.rounds.forEach((round, ri) => {
    if (!round.connectors || !round.connectors.length) return;
    const prev = DATA.rounds[ri-1]; if (!prev) return;
    const col  = bEl.querySelector('[data-conn="' + prev.id + '-' + round.id + '"]'); if (!col) return;
    const svg  = col.querySelector('svg'); svg.innerHTML = '';
    const colLeft = col.getBoundingClientRect().left - bRect.left;
    function seg(x1,y1,x2,y2) {
      const l = document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1', x1-colLeft); l.setAttribute('y1', y1);
      l.setAttribute('x2', x2-colLeft); l.setAttribute('y2', y2);
      l.setAttribute('stroke','#353a47'); l.setAttribute('stroke-width','1.5'); l.setAttribute('stroke-linecap','round');
      svg.appendChild(l);
    }
    const groups = {};
    round.connectors.forEach(c => { if (!groups[c.toGame]) groups[c.toGame] = []; groups[c.toGame].push(c); });
    Object.entries(groups).forEach(([toId, conns]) => {
      const toLeft = getLX(toId); if (toLeft === null) return;
      if (conns.length === 1) {
        const c = conns[0];
        const fx = getRX(c.fromGame), fy = getY(c.fromGame, c.fromSide), ty = getY(toId, c.toSide);
        if (fx===null||fy===null||ty===null) return;
        const mx = fx + (toLeft-fx)/2;
        seg(fx,fy,mx,fy); if (Math.abs(fy-ty) > 1) seg(mx,fy,mx,ty); seg(mx,ty,toLeft,ty);
      } else if (conns.length === 2) {
        const c0=conns[0], c1=conns[1];
        const fx0=getRX(c0.fromGame), fy0=getY(c0.fromGame,c0.fromSide);
        const fx1=getRX(c1.fromGame), fy1=getY(c1.fromGame,c1.fromSide);
        const ty0=getY(toId,c0.toSide), ty1=getY(toId,c1.toSide);
        if ([fx0,fx1,fy0,fy1,ty0,ty1,toLeft].some(v => v===null)) return;
        const barX = Math.max(fx0,fx1) + (toLeft - Math.max(fx0,fx1)) * 0.45;
        seg(fx0,fy0,barX,fy0); seg(fx1,fy1,barX,fy1);
        seg(barX,fy0,barX,fy1);
        seg(barX,(fy0+fy1)/2, toLeft,(ty0+ty1)/2);
      }
    });
  });
}
window.addEventListener('resize', () => requestAnimationFrame(() => {
  alignSplitGaps();
  requestAnimationFrame(drawConnectors);
}));

// ── Score Engine ─────────────────────────────────────────────
// Uses the ESPN public scoreboard API — reliable, no auth, no rate limits.
// Fetched once per conference per page session. Only marks completed games.

const FETCHED = new Set();

function setStatus(type, msg) {
  const b = document.getElementById('statusBar');
  b.className = 'status-bar ' + type; b.innerHTML = msg;
}

function norm(s) {
  return (s || '').toLowerCase()
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\bumass\b/, 'massachusetts')
    .replace(/\bst\b/g,   'state')
    .replace(/\buniv\b/g, 'university')
    .replace(/\s+/g, ' ').trim();
}
function nameMatch(a, b) {
  if (!a || !b) return false;
  const na = norm(a), nb = norm(b);
  if (na === nb) return true;
  const wa = na.split(' ').filter(w => w.length > 3);
  const wb = nb.split(' ').filter(w => w.length > 3);
  return wa.some(w => wb.includes(w));
}

async function fetchESPN(cfg) {
  const groupId = cfg.espnGroupId;
  if (!groupId) return [];
  const url = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard'
            + '?groups=' + groupId + '&dates=20260301-20260315&limit=100';
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return [];
    const d = await r.json();
    return d.events || [];
  } catch { return []; }
}

function applyESPN(confData, events) {
  let updated = 0;
  const allGames = confData.rounds.flatMap(r => r.games);
  for (const g of allGames) {
    if (!g.top?.name || !g.bot?.name) continue;
    if (/(Winner|TBD)/i.test(g.top.name) || /(Winner|TBD)/i.test(g.bot.name)) continue;
    if (g.status === 'final') continue;
    const ev = g.espnId
      ? events.find(e => e.id === String(g.espnId))
      : events.find(e => {
          const comps = e.competitions?.[0]?.competitors || [];
          const names = comps.map(c => c.team?.displayName || c.team?.name || '');
          return (nameMatch(names[0], g.top.name) && nameMatch(names[1], g.bot.name))
              || (nameMatch(names[0], g.bot.name) && nameMatch(names[1], g.top.name));
        });
    if (!ev) continue;
    const comp   = ev.competitions?.[0];
    if (comp?.status?.type?.name !== 'STATUS_FINAL') continue;
    const comps  = comp.competitors || [];
    const home   = comps.find(c => c.homeAway === 'home') || comps[0];
    const away   = comps.find(c => c.homeAway === 'away') || comps[1];
    if (!home || !away) continue;
    const homeIsTop = nameMatch(home.team?.displayName || '', g.top.name);
    const topComp   = homeIsTop ? home : away;
    const botComp   = homeIsTop ? away : home;
    const ts = parseInt(topComp.score), bs = parseInt(botComp.score);
    if (isNaN(ts) || isNaN(bs)) continue;
    g.topScore = ts; g.botScore = bs;
    g.status = 'final'; g.winner = ts > bs ? 'top' : 'bot';
    if (!g.espnId) g.espnId = ev.id;
    updated++;
  }
  return updated;
}

async function fetchScores() {
  const cfg = CONFS[activeConf];
  if (!cfg) return;
  const btn = document.querySelector('.refresh-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Checking\u2026';
  setStatus('info', '<span class="spinner"></span>&nbsp;Checking ESPN for completed games\u2026');
  try {
    const events = await fetchESPN(cfg);
    if (!events.length) {
      setStatus('info', '\u2139 No ESPN data found \u2014 scores may already be hardcoded.');
    } else {
      const updated = applyESPN(cfg.data, events);
      if (updated > 0) { render(); setStatus('ok', '\u2713 ' + updated + ' completed game(s) applied.'); }
      else setStatus('ok', '\u2713 Scores checked \u2014 nothing new to update.');
    }
    FETCHED.add(activeConf);
  } catch(e) { setStatus('error', '\u26a0 ' + e.message); }
  btn.disabled = false; btn.innerHTML = '\u21bb Check Scores';
}

function fetchIfNeeded() {
  render();
  if (!FETCHED.has(activeConf)) fetchScores();
  else setStatus('ok', '\u2713 Already checked this session.');
}
