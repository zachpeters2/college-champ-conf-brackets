<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 NCAA Conference Tournament Brackets</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">

  <meta name="description" content="Live 2026 NCAA conference tournament brackets — scores, seeds, matchups, and TV info updated in real time.">
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="2026 NCAA Conference Tournament Brackets">
  <meta property="og:description" content="Live brackets for all conference tournaments — scores, seeds, TV info, updated in real time.">
  <meta property="og:image"       content="https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/March_Madness_logo.svg/800px-March_Madness_logo.svg.png">
  <meta name="twitter:card"       content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>

<div id="sbOverlay"></div>
<button class="sb-toggle" id="sbToggle" onclick="toggleSidebar()">‹</button>
<nav id="sidebar">
  <div class="sb-header">
    <span class="sb-title">Conferences</span>
  </div>
  <!-- Sidebar buttons are injected by main.js from conferences.json -->
  <div id="confList"></div>
</nav>

<div id="main">
  <button class="sb-hamburger" id="sbHamburger" onclick="toggleSidebar()">☰</button>
  <header class="site-header">
    <div class="hdr-sponsor" id="hdrSponsor"></div>
    <h1 class="hdr-title"   id="hdrTitle"></h1>
    <div class="hdr-sub"    id="hdrSub"></div>
    <div class="hdr-meta">
      <div id="hdrBadges" style="display:contents"></div>
      <span class="last-upd" id="lastUpd">—</span>
      <button class="refresh-btn" onclick="refreshScores()">↻ Refresh</button>
    </div>
  </header>

  <div class="status-bar" id="statusBar"></div>

  <div class="bracket-outer">
    <div class="bracket" id="bracket"></div>
  </div>

  <footer class="site-footer">
    <div class="ft-disc"  id="ftDisc"></div>
    <div class="ft-links" id="ftLinks"></div>
  </footer>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
